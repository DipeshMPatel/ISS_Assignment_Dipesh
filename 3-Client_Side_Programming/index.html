<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>Registration Form</h2>

        <!-- Form calls validateForm() when Submit is clicked -->
        <form id="registrationForm" onsubmit="return validateForm()">

            <!-- Full Name -->
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter your full name" required>


            <!-- Age -->
            <label for="age">Age:</label>
            <input type="number" id="age" min="18" max="60" required>


            <!-- Date of Birth -->
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" required>


            <!-- Gender -->
            <label>Gender:</label>

            <input type="radio" name="gender" value="Male" required>
            Male

            <input type="radio" name="gender" value="Female">
            Female


            <!-- Country -->
            <label for="country">Country:</label>

            <select id="country" required>

                <option value="">-- Select Country --</option>
                <option value="India">India</option>
                <option value="Japan">Japan</option>
                <option value="Germany">Germany</option>
                <option value="Australia">Australia</option>

            </select>


            <!-- Phone Number -->
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" placeholder="Enter 10-digit phone number" required>


            <!-- Email -->
            <label for="email">Email Address:</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>


            <!-- Password -->
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Create a password" required>


            <!-- Upload Resume -->
            <label for="resume">Upload Resume:</label>
            <input type="file" id="resume" accept=".pdf,.doc,.docx" required>


            <!-- Range -->
            <label for="skill">Programming Knowledge:</label>
            <input type="range" id="skill" min="1" max="10">


            <!-- Terms & Conditions -->
            <label>
                <input type="checkbox" id="terms" required>
                I agree to the Terms and Conditions
            </label>


            <!-- Submit Button -->
            <button type="submit">Register</button>


            <!-- Displays Success / Error Messages -->
            <div id="message" class="message" style="display:none;"></div>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
